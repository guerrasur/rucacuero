<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Ruca Cuero: rama xilográfica de noche con nudo de savia -->
  <rect width="512" height="512" fill="#131B12"/>
  <!-- rama vertical con bordes irregulares -->
  <path d="M198 0 C 186 60 210 96 200 150 C 190 208 214 250 204 310 C 196 362 216 420 206 512
           L 318 512 C 306 448 330 400 318 340 C 308 288 330 236 320 180 C 312 128 330 62 320 0 Z"
        fill="#7FA636" stroke="#2A1C14" stroke-width="18"/>
  <!-- estrías de musgo -->
  <g stroke="#43601F" stroke-width="10" stroke-linecap="round" fill="none">
    <path d="M244 40 C 240 80 248 110 242 150"/>
    <path d="M278 200 C 274 240 282 270 276 310"/>
    <path d="M240 360 C 236 400 244 430 238 470"/>
  </g>
  <!-- nudo -->
  <circle cx="262" cy="256" r="46" fill="#95A03C" stroke="#2A1C14" stroke-width="14"/>
  <path d="M262 256 a 20 20 0 1 1 20 20" fill="none" stroke="#2A1C14" stroke-width="11" stroke-linecap="round"/>
  <!-- gota de savia: el único acento cálido -->
  <path d="M262 318 C 246 342 238 356 238 370 a 24 24 0 0 0 48 0 C 286 356 278 342 262 318 Z"
        fill="#F0A32A" stroke="#2A1C14" stroke-width="12"/>
</svg>
